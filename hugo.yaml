baseURL: "https://hi.tokenisite.top"
title: "词元计数器"
languageCode: zh-tw
defaultContentLanguage: zh-tw
copyright: "🆓 [CC0](https://creativecommons.org/public-domain/cc0/) 授权，允许您自由使用。"
theme: ["PaperMod"]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true

languages:
  zh-tw:
    languageName: "正體中文"
    menu:
      main:
        - name: 📚 檔案
          url: archives
        - name: ❓ 關於
          url: about

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "詞元說話，要按 token 收費"
  author: "詞元"
  fancyTitle: "⌨️ 詞元計數器"

  defaultTheme: auto
  disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: false

  homeInfoParams:
    Title: "詞元計數器"
    Content: "詞元說話，要按 token 收費"

  socialIcons:
    - name: github
      title: 看看詞元的 Github
      url: "https://github.com/tokenicrat"
    - name: email
      title: 通過郵件聯繫詞元
      url: "mailto:tokenicrat@tuta.io"

  assets:
    favicon: "favicon.ico"
    favicon16x16: "favicon.ico"
    favicon32x32: "favicon.ico"
    apple_touch_icon: "favicon.ico"
    safari_pinned_tab: "favicon.ico"
